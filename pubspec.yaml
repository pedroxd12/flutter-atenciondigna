name: aplicacion
description: "Atencion Digna - App del paciente (Hackaton Talent Land 2026)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Estado y dependencias
  flutter_riverpod: ^2.5.1

  # Navegacion
  go_router: ^14.6.2

  # HTTP
  dio: ^5.7.0

  # QR (pase digital de check-in)
  qr_flutter: ^4.1.0

  # SVG (mapa interno y assets vectoriales)
  flutter_svg: ^2.0.10+1

  # Geolocalizacion (sucursal mas cercana)
  geolocator: ^13.0.2

  # Firebase + Google Sign-In (autenticacion del paciente)
  # NOTA: requieren `flutterfire configure`. Ver SETUP_NATIVE.md
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1

  # Notificaciones push (turno listo, resultados disponibles, preparaciones)
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # Persistencia local (token JWT)
  shared_preferences: ^2.3.3

  # Utilidades
  intl: ^0.20.2
  equatable: ^2.0.5

  # Localizaciones de Material (DatePicker, etc.) — sin esto el showDatePicker
  # explota con "No MaterialLocalizations found".
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/img/
